repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: semgrep
        name: Semgrep Scan
        entry: semgrep --config auto
        language: system
        types: [python]
        pass_filenames: false
